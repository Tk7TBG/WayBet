<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
    <title>WayBet</title>
  </head>
  <body>
    <header>
      <div id="top-header">
        <div class="brand">
          <img src="Icons/Flag_of_Botswana.svg" class="flag" alt="BW" />
          <a href="" class="logo">Way-Bet</a>
        </div>
        <div class="auth-group">
          <button class="btn-login">Login</button>
          <button class="btn-signup">Sign Up</button>
        </div>
        <div class="utility-group">
          <a href=""><img src="Icons/chat.svg" class="icon" /></a>
          <a href=""><img src="Icons/search.svg" class="icon" /></a>
        </div>
      </div>

      <nav id="bottom-header">
        <a href="" class="nav-item">
          <img src="Icons/home.svg" alt="Home" class="icon" />
          <span>Home</span>
        </a>
        <a href="" class="nav-item">
          <img src="Icons/casino.svg" alt="Casino" class="icon" />
          <span>Casino</span>
        </a>
        <a href="" class="nav-item">
          <img src="Icons/plane.svg" alt="Plane" class="icon" />
          <span>Aviator</span>
        </a>
      </nav>
    </header>

    <div class="game">
      <div class="game-container">
        <canvas id="gameCanvas" height="400" width="800"></canvas>
        <div class="ui-overlay">
          <h1 id="multiplierText">1.00x</h1>
          <div id="statusText"></div>
        </div>
      </div>
      <div class="controls">
        <div class="stats">
          <div>
            Bet:
            <input
              type="number"
              id="betAmount"
              value="10"
              min="0"
              step="0.01"
            />
          </div>
          <div>Balance: <span id="balance">1000</span>BWP</div>
        </div>
        <button id="actionBtn" onclick="handleAction()">PLACE BET</button>
      </div>
      <div class="debug-view">
        <p>Target Multiplier: <span id="targetMultiplier"></span></p>
        <p>Estimated Winnings: <span id="estimatedWinnings"></span></p>
        <p>State: <span id="gameStateText"></span></p>
      </div>
    </div>
  </body>
</html>
